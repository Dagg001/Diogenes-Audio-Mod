name: Publicar Release Diogenes Audio Mod

# El robot ahora solo se activará cuando subas una "Etiqueta de versión" (ej. v1.0)
on:
  push:
    tags:
      - 'v*' 

# Permisos necesarios para que el robot pueda crear la Release en tu repositorio
permissions:
  contents: write

jobs:
  build-and-release:
    name: Crear Ejecutable y Publicar Release
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PyInstaller
        run: python -m pip install pyinstaller

      - name: Compilar la Aplicación
        run: python -m PyInstaller --onefile --windowed Diogenes_Audio_Mod.py

      - name: Crear Release y Subir .exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Diogenes_Audio_Mod.exe # Sube directamente el archivo ejecutable
          generate_release_notes: true       # Genera un texto automático con los cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}